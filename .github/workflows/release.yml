name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release Artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Safe to expose: this is the boolean "is a signing key configured?", not the key
    # itself. Used to gate the signing step. The actual secret is only injected into the
    # signing step's own env, never into build/install steps.
    env:
      HAS_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp release version
        run: node .github/scripts/set-release-package-version.mjs "${{ github.ref_name }}"

      - name: Build
        run: pnpm build

      - name: Create release tarball
        # pnpm-lock.yaml is required so the self-updater can verify the
        # transitive dep graph with --frozen-lockfile (#666). Without it,
        # `pnpm install --prod` re-resolves from the public registry on every
        # `dysflow update`, defeating the trust model that says we ship
        # exactly the graph we built and signed.
        run: |
          tar -czf dysflow-${{ github.ref_name }}.tar.gz dist scripts references/error-codes.md docs/diagnostics/hresult-guide.md docs/diagnostics/form-import-gate-failures.md package.json pnpm-lock.yaml README.md CHANGELOG.md

      - name: Generate checksums
        run: sha256sum dysflow-*.tar.gz > SHA256SUMS

      - name: Require release signing key
        if: ${{ env.HAS_SIGNING_KEY != 'true' }}
        run: |
          echo "RELEASE_SIGNING_KEY is required to publish signed Dysflow releases." >&2
          echo "Generate a keypair with .github/scripts/generate-release-signing-key.sh and store the private key as the GitHub Actions secret." >&2
          exit 1

      # Authenticity: sign SHA256SUMS with the Ed25519 release key and publish a
      # detached base64 signature (SHA256SUMS.sig). The self-updater verifies it
      # fail-closed against RELEASE_SIGNING_PUBLIC_KEY_PEM before trusting checksums.
      # See docs/security/update-trust-model.md.
      - name: Sign checksums (Ed25519)
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          KEYFILE="$RUNNER_TEMP/release-signing.key"
          PUBFILE="$RUNNER_TEMP/release-signing.pub"
          RAWSIG="$RUNNER_TEMP/SHA256SUMS.sig.raw"
          umask 077
          printf '%s' "$RELEASE_SIGNING_KEY" > "$KEYFILE"
          openssl pkeyutl -sign -inkey "$KEYFILE" -rawin -in SHA256SUMS | base64 -w0 > SHA256SUMS.sig
          # Self-verify the produced signature so a broken signing step fails the release
          # instead of publishing an invalid SHA256SUMS.sig.
          openssl pkey -in "$KEYFILE" -pubout -out "$PUBFILE"
          base64 -d SHA256SUMS.sig > "$RAWSIG"
          openssl pkeyutl -verify -pubin -inkey "$PUBFILE" -rawin -in SHA256SUMS -sigfile "$RAWSIG"
          rm -f "$KEYFILE" "$PUBFILE" "$RAWSIG"
          echo "Signed SHA256SUMS -> SHA256SUMS.sig"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # AGENTS.md hard rule: the release title MUST equal the tag name.
          # Pass the ref (e.g. "v1.13.0") as the release name so the artifact
          # is born matching the tag. The assert-release-name step below
          # verifies the invariant immediately after creation — replaces the
          # previous release-title-guard.yml workflow, which was doubly dead:
          # it used the wrong field (`.title` instead of `.name`) AND its
          # `release: [created, edited]` trigger never fired for releases
          # created with GITHUB_TOKEN.
          name: ${{ github.ref_name }}
          files: |
            dysflow-*.tar.gz
            SHA256SUMS
            SHA256SUMS.sig
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # #668 — replaces the dead release-title-guard.yml. Verifies the
      # published release's `name` matches the tag immediately after
      # creation, protecting against a future softprops action change. Later
      # human edits are checked independently by release-title-guard.yml.
      - name: Assert release name == tag (#668)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve the tag name from the ref (refs/tags/vX.Y.Z → vX.Y.Z).
          TAG="${GITHUB_REF_NAME}"
          # Fetch the release that softprops just created.
          RELEASE_NAME="$(gh release view "${TAG}" --json name --jq .name)"
          if [ "${RELEASE_NAME}" != "${TAG}" ]; then
            echo "Release name must equal tag_name." >&2
            echo "  name    = ${RELEASE_NAME}" >&2
            echo "  tag     = ${TAG}" >&2
            exit 1
          fi
          echo "Release name matches tag: ${TAG}"
