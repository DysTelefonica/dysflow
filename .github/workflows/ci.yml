name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high --ignore-registry-errors
        # --ignore-registry-errors: npm retired the /security/audits endpoint
        # (responds 410). pnpm 10.x surfaces this as ERR_PNPM_AUDIT_BAD_RESPONSE
        # even when no vulnerabilities exist. The flag treats registry errors
        # as exit 0 so legitimate advisories still fail the job but registry
        # outages / deprecations do not block PRs.

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Coverage
        run: pnpm coverage

  windows-integration-smoke:
    name: Windows PowerShell/Access smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Windows PowerShell host
        shell: pwsh
        run: |
          Get-Command powershell.exe
          powershell.exe -NoProfile -NonInteractive -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Run PowerShell Pester tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester)) {
            Install-Module Pester -Force -Scope CurrentUser
          }
          Import-Module Pester
          $result = Invoke-Pester -Path scripts/tests -PassThru -Output Minimal
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Run Access/PowerShell integration tests
        shell: pwsh
        run: |
          $report = Join-Path $env:RUNNER_TEMP "windows-access-smoke-vitest.json"
          pnpm vitest run --config vitest.integration.config.ts --reporter=default --reporter=json --outputFile=$report test/e2e/access-fixture.e2e.test.ts test/e2e/access-relink-directory.test.ts test/e2e/access-relink-directory-apply.test.ts
          $vitestExit = $LASTEXITCODE
          node scripts/access-smoke-evidence.mjs $report
          $evidenceExit = $LASTEXITCODE
          if ($vitestExit -ne 0) { exit $vitestExit }
          if ($evidenceExit -ne 0) { exit $evidenceExit }
