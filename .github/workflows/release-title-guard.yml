name: Release Title Guard

# Defense-in-depth for the AGENTS.md hard rule "A GitHub release title must
# equal its tag name exactly" (e.g. tag `v1.2.8` -> title `v1.2.8`).
#
# release.yml already passes `name: ${{ github.ref_name }}` to the softprops
# action so the published release's `name` field is set to the tag at
# creation time. This workflow re-asserts the invariant on `release: created`
# AND `edited` so any drift introduced post-creation (e.g. a maintainer
# re-titling the release in the GitHub UI, a bot edit) also fails the job.
#
# The check is a single shell `if` that compares the two templated values
# and, on mismatch, prints both to stderr with explicit labels and exits 1.
# The labels in the error message are the only thing a maintainer needs to
# know to fix the release without re-running the workflow.
on:
  release:
    types: [created, edited]

permissions:
  contents: read

jobs:
  assert:
    name: title == tag_name
    runs-on: ubuntu-latest
    steps:
      - name: Assert title == tag_name
        run: |
          if [ "${{ github.event.release.title }}" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release title must equal tag_name." >&2
            echo "  title    = ${{ github.event.release.title }}" >&2
            echo "  tag_name = ${{ github.event.release.tag_name }}" >&2
            exit 1
          fi
